version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    groups:
      dotnet-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: examples/web
    schedule:
      interval: weekly
    groups:
      web-npm:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: examples/python
    schedule:
      interval: weekly
    groups:
      python-pip:
        patterns: ["*"]
