name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

jobs:
  analyze-scripted:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v4
        with:
          upload: false
          output: codeql-sarif
      - name: Upload CodeQL SARIF (when code scanning enabled)
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: codeql-sarif
          category: codeql-${{ matrix.language }}

  analyze-csharp:
    name: Analyze (csharp)
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Build WinUI solution for CodeQL
        run: |
          dotnet restore SpatialLabsOptimizer.sln
          dotnet build SpatialLabsOptimizer.sln -c Release --no-restore

      - uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: none

      - uses: github/codeql-action/analyze@v4
        with:
          upload: false
          output: codeql-sarif
      - name: Upload CodeQL SARIF (when code scanning enabled)
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: codeql-sarif
          category: codeql-csharp
