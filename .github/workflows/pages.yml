name: GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "examples/web/**"
      - "site/catalog/**"
      - "workers/steam-library/**"
      - "docs/STEAM_CATALOG_SYNC.md"
      - "data/compatibility/catalog-v2.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build web demo and 3D catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: SteamDB policy (ADR-0005)
        run: bash scripts/check-steamdb-policy.sh

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: examples/web/package-lock.json

      - name: Build examples/web demo
        working-directory: examples/web
        run: |
          npm ci
          npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/catalog/package-lock.json

      - name: Build site/catalog browser
        working-directory: site/catalog
        run: |
          npm ci
          npm test
          npm run build
          npm run smoke
          npm run smoke:rank
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/catalog/
          VITE_STEAM_SYNC_URL: ${{ vars.STEAM_SYNC_WORKER_URL }}

      - name: Steam sync URL notice
        if: ${{ vars.STEAM_SYNC_WORKER_URL == '' }}
        run: |
          echo "::notice::STEAM_SYNC_WORKER_URL is unset — catalog built without Connect Steam (expected until worker deploy)"

      - name: Combine Pages artifact
        run: |
          mkdir -p examples/web/dist/catalog
          cp -r site/catalog/dist/* examples/web/dist/catalog/
          mkdir -p examples/web/dist/catalog/data
          cp data/compatibility/catalog-v2.json examples/web/dist/catalog/data/catalog-v2.json
          cp data/compatibility/price-history-v1.json examples/web/dist/catalog/data/price-history-v1.json 2>/dev/null || true
          python3 scripts/sync-catalog/compute-catalog-hash.py
          cp data/compatibility/catalog-v2.sha256 examples/web/dist/catalog/data/catalog-v2.sha256

      - uses: actions/upload-pages-artifact@v5
        with:
          path: examples/web/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
