name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v0.7.1)
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Attach SBOM and Packaging Assets
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' && !startsWith(github.event.release.tag_name, 'SpatialLabsOptimizer-v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify template version matches tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          TAG="${TAG#v}"
          VERSION=$(tr -d '[:space:]' < .template-version)
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match .template-version ($VERSION)"
            exit 1
          fi

      - name: Generate root SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.20.6
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Generate web stack SBOM slice
        if: hashFiles('examples/web/package.json') != ''
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.20.6
        with:
          path: examples/web
          format: cyclonedx-json
          output-file: sbom-web.cyclonedx.json

      - name: Generate python stack SBOM slice
        if: hashFiles('examples/python/pyproject.toml') != ''
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.20.6
        with:
          path: examples/python
          format: cyclonedx-json
          output-file: sbom-python.cyclonedx.json

      - name: Generate Winget manifest stub
        run: bash scripts/generate-winget-manifest.sh "AgentProjectBootstrap.Template" "$(tr -d '[:space:]' < .template-version)"

      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2.2.0
        with:
          subject-path: sbom.cyclonedx.json

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          FILES="packaging/winget/manifest.stub.yaml sbom.cyclonedx.json"
          if [ -f sbom-web.cyclonedx.json ]; then FILES="$FILES sbom-web.cyclonedx.json"; fi
          if [ -f sbom-python.cyclonedx.json ]; then FILES="$FILES sbom-python.cyclonedx.json"; fi
          gh release upload "$TAG" $FILES --clobber
