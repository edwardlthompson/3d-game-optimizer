name: Health Check

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_EXAMPLE_STACKS: ${{ vars.CI_EXAMPLE_STACKS || 'on' }}

jobs:
  health:
    name: Weekly Workflow Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify CI + Security Scan + CodeQL green on HEAD
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/check-github-ci.sh "$(git rev-parse HEAD)"

      - name: Security triage recency
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/check-security-triage.sh

      - name: Scorecard recency
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/check-scorecard-recency.sh --days 30

      - name: Setup Node for npm audit
        if: env.CI_EXAMPLE_STACKS == 'on' && hashFiles('examples/web/package-lock.json') != ''
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: examples/web/package-lock.json

      - name: npm audit (examples/web)
        if: env.CI_EXAMPLE_STACKS == 'on' && hashFiles('examples/web/package-lock.json') != ''
        run: |
          cd examples/web
          npm ci
          npm audit --audit-level=high

      - name: Setup uv for Python audit
        if: env.CI_EXAMPLE_STACKS == 'on' && hashFiles('examples/python/uv.lock') != ''
        uses: astral-sh/setup-uv@v7

      - name: uv pip audit (examples/python)
        if: env.CI_EXAMPLE_STACKS == 'on' && hashFiles('examples/python/uv.lock') != ''
        run: |
          cd examples/python
          uv sync --locked
          uv pip audit

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: NuGet vulnerable package audit
        run: |
          dotnet restore SpatialLabsOptimizer.sln
          dotnet list SpatialLabsOptimizer.sln package --vulnerable --include-transitive \
            | tee nuget-vulnerable.txt
          if rg -q 'has the following vulnerable packages' nuget-vulnerable.txt; then
            echo "High/Critical NuGet vulnerabilities found"
            exit 1
          fi
