name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  encoding-check:
    name: File Encoding (UTF-8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-file-encoding.sh

  file-limits:
    name: File Size Budgets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-file-limits.sh

  workflow-actions:
    name: Validate Workflow Action Refs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/validate-workflow-actions.sh

  winui:
    name: WinUI - Build and Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Build solution
        run: dotnet build SpatialLabsOptimizer.sln --configuration Release
      - name: Test solution
        run: dotnet test src/SpatialLabsOptimizer.Tests/SpatialLabsOptimizer.Tests.csproj --configuration Release --no-build --verbosity normal

  privacy-audit:
    name: Privacy Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: bash scripts/privacy-audit.sh

  logo-audit:
    name: Logo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/logo-audit.sh

  pr-title:
    name: Conventional Commits PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  readme-health:
    name: README Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-readme-health.sh --quick

  adr-status:
    name: ADR Status
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-adr-status.sh

  legal-consistency:
    name: Legal Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-legal-consistency.sh

  build-verification:
    name: Build Verification Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Quick gate (PR)
        if: github.event_name == 'pull_request'
        run: bash scripts/build-verification-gate.sh --quick --skip-pre-commit --skip-dotnet
      - name: Full gate (main)
        if: github.event_name != 'pull_request'
        run: bash scripts/build-verification-gate.sh --skip-pre-commit --skip-dotnet
