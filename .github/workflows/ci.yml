name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  encoding-check:
    name: File Encoding (UTF-8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-file-encoding.sh

  file-limits:
    name: File Size Budgets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-file-limits.sh

  workflow-actions:
    name: Validate Workflow Action Refs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/validate-workflow-actions.sh

  winui:
    name: WinUI - Build and Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Build solution
        run: dotnet build SpatialLabsOptimizer.sln --configuration Release
      - name: Test solution
        run: dotnet test src/SpatialLabsOptimizer.Tests/SpatialLabsOptimizer.Tests.csproj --configuration Release --no-build --verbosity normal

  privacy-audit:
    name: Privacy Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: bash scripts/privacy-audit.sh

  logo-audit:
    name: Logo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/logo-audit.sh

  pr-title:
    name: Conventional Commits PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  readme-health:
    name: README Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-readme-health.sh --quick

  adr-status:
    name: ADR Status
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-adr-status.sh

  legal-consistency:
    name: Legal Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-legal-consistency.sh

  build-verification:
    name: Build Verification Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Quick gate (validate-workflow-actions runs in separate job)
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/build-verification-gate.sh --quick --skip-pre-commit --skip-dotnet

  qa-matrix-coverage:
    name: QA Matrix P0 Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: bash scripts/check-qa-matrix-coverage.sh
      - run: bash scripts/check-compatibility-seed.sh

  local-release-scripts:
    name: Local Release Script Inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-local-release-scripts.sh

  post-sprint-validation:
    name: Post-Sprint Validation (assets + gates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pillow
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: bash scripts/run-post-sprint-validation.sh

  catalog-site:
    name: Catalog site - build and smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/catalog/package-lock.json
      - name: Build and smoke test catalog
        working-directory: site/catalog
        env:
          VITE_STEAM_SYNC_URL: https://steam-sync.example.test
        run: |
          npm ci
          npm run build
          npm run test
          npm run smoke

  steam-library-worker:
    name: Steam library worker - typecheck and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/steam-library
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: workers/steam-library/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
