name: Release Credentials Setup

on:
  workflow_dispatch:
    inputs:
      repo:
        description: owner/repo (defaults to current repository)
        required: false
        type: string
      push_sideload_secrets:
        description: Push AUTO sideload CODESIGN_* secrets to GitHub
        required: false
        type: boolean
        default: false

# Repo admin PATCH (security settings) may still require a PAT — GITHUB_TOKEN cannot use administration.
permissions:
  contents: write
  actions: write
  security-events: write
  secrets: write

jobs:
  setup:
    name: Setup release credentials
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure release credentials via gh API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTO_SETUP_SIDeload_CODESIGN: ${{ inputs.push_sideload_secrets == true && '1' || '' }}
        run: |
          REPO="${{ inputs.repo }}"
          if [ -z "$REPO" ]; then REPO="$GITHUB_REPOSITORY"; fi
          bash scripts/setup-release-credentials.sh "$REPO"
