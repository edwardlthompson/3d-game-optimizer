name: Reusable steam worker lint

on:
  workflow_call:

jobs:
  lint:
    name: Typecheck worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/steam-library
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: workers/steam-library/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
