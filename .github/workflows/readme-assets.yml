name: README Assets

on:
  push:
    branches: [main]
    paths:
      - scripts/generate-brand-assets.py
      - src/SpatialLabsOptimizer/Views/**
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

permissions:
  contents: write

jobs:
  regenerate:
    name: Regenerate README UI previews
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pillow
      - run: python scripts/generate-brand-assets.py
      - name: Commit updated assets (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/readme/*.png src/SpatialLabsOptimizer/Assets/*.png
          if git diff --staged --quiet; then
            echo "README assets unchanged"
          else
            git commit -m "chore(assets): regenerate README UI previews"
            git push
          fi
