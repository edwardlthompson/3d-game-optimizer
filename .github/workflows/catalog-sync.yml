name: Catalog sync

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  merge-validate:
    name: Merge sources and validate catalog v2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          python3 -m pip install -r scripts/sync-catalog/requirements-catalog.txt
          python3 -m playwright install chromium

      - name: Scrape lenticular 3D sources
        run: |
          failed=0
          python3 scripts/sync-catalog/scrape-truegame.py || failed=$((failed + 1))
          python3 scripts/sync-catalog/scrape-uevr-profiles.py || failed=$((failed + 1))
          python3 scripts/sync-catalog/scrape-vrto3d-wiki.py || failed=$((failed + 1))
          python3 scripts/sync-catalog/scrape-pcgw-3dvision.py || failed=$((failed + 1))
          echo "scraper_failures=$failed"
          if [ "$failed" -eq 4 ]; then
            echo "All catalog scrapers failed"
            exit 1
          fi

      - name: Merge and enrich catalog
        run: |
          bash scripts/check-steamdb-policy.sh
          python3 scripts/sync-catalog/merge-catalog.py
          python3 scripts/sync-catalog/resolve-steam-appids.py
          python3 scripts/sync-catalog/enrich-steam-stats.py
          python3 scripts/sync-catalog/append-price-history.py
          python3 scripts/sync-catalog/export-catalog-markdown.py
          python3 scripts/sync-catalog/compute-catalog-hash.py

      - name: Validate catalog v2
        run: python3 scripts/check-compatibility-catalog.py

      - name: Run merge unit tests
        run: |
          python3 scripts/sync-catalog/test_merge_catalog.py
          python3 scripts/sync-catalog/test_enrich_steam_stats.py
          python3 scripts/sync-catalog/test_resolve_steam_appids.py

      - name: Upload catalog artifact
        uses: actions/upload-artifact@v7
        with:
          name: catalog-v2
          path: |
            data/compatibility/catalog-v2.json
            data/compatibility/catalog-v2.sha256
            data/compatibility/price-history-v1.json
            docs/compatibility/LENTICULAR_GAMES.md

  open-pr:
    name: Open catalog update PR
    needs: merge-validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: catalog-v2
          path: artifact

      - name: Copy catalog outputs into workspace
        run: |
          cp artifact/data/compatibility/catalog-v2.json data/compatibility/catalog-v2.json
          cp artifact/data/compatibility/catalog-v2.sha256 data/compatibility/catalog-v2.sha256
          cp artifact/data/compatibility/price-history-v1.json data/compatibility/price-history-v1.json
          cp artifact/docs/compatibility/LENTICULAR_GAMES.md docs/compatibility/LENTICULAR_GAMES.md

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          commit-message: "chore(catalog): weekly sync update"
          title: "chore(catalog): weekly sync update"
          body: |
            Automated catalog merge from scheduled sync workflow.
            Review game count, Steam stats, and `syncStatus` before merge.
          branch: auto/catalog-sync
          delete-branch: true
